---
aid: sapienza-university-of-rome
name: Sapienza University of Rome
description: >-
  Sapienza University of Rome (Sapienza Università di Roma) is Italy's largest
  university and ranked #132 in the QS World University Rankings 2025. Its public
  machine-readable footprint is centered on research and library data rather than
  a unified developer portal: the IRIS institutional research catalogue exposes a
  DSpace OAI-PMH endpoint for harvesting research metadata, and the Sapienza
  Library System (Sistema Bibliotecario Sapienza) publishes open data and linked
  data following the 5-star open data model. There is no single official,
  documented public REST API gateway; identity is federated via the Italian IDEM
  Shibboleth/SAML federation. A GitHub organization carrying the Sapienza name
  exists but hosts research and coursework projects rather than official platform APIs.
