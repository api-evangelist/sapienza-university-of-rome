apis:
  - aid: sapienza-university-of-rome:iris-oai-pmh
    name: IRIS Research Catalogue OAI-PMH
    description: >-
      OAI-PMH 2.0 metadata harvesting interface for IRIS, Sapienza's institutional
      research information system / repository (DSpace platform developed by CINECA).
      The endpoint (repositoryName "IRIS - UNIROMA1 - prod") supports standard OAI-PMH
      verbs (Identify, ListRecords, ListMetadataFormats, etc.) for harvesting Sapienza
      research-product metadata. Verified live returning valid OAI-PMH 2.0 XML.
    humanURL: https://www.uniroma1.it/en/pagina/iris-support
    baseURL: https://iris.uniroma1.it/oai/request
    tags: [ Research, Repository, OAI-PMH, DSpace, Metadata ]
    properties:
      - type: Documentation
        url: https://www.uniroma1.it/en/pagina/iris-support
      - type: Repository
        url: https://iris.uniroma1.it/
  - aid: sapienza-university-of-rome:library-open-data
    name: Sapienza Library System Open Data & Linked Data
    description: >-
      Open data and linked data publishing from the Sistema Bibliotecario Sapienza
      (Sapienza Library System), providing library and digital-resource datasets under
      CC BY 4.0 following the 5-star open data model and a DCAT-AP_IT profile. Datasets
      are catalogued and downloadable; a linked data service is also published. No
      formal documented REST API is provided beyond the dataset catalogue and linked
      data resources.
    humanURL: https://sbs.uniroma1.it/data/opendata/
    tags: [ Open Data, Linked Data, Library, DCAT, CC-BY ]
    properties:
      - type: Documentation
        url: https://sbs.uniroma1.it/data/opendata/
      - type: LinkedData
        url: https://sbs.uniroma1.it/data/linkeddata
