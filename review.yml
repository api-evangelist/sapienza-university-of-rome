  - date: '2026-06-03'
    rating: 2
    summary: >-
      Sapienza has no unified, documented public developer portal or REST API gateway.
      The strongest verified machine-readable surface is the IRIS DSpace OAI-PMH endpoint,
      which I confirmed live returns valid OAI-PMH 2.0 XML (repositoryName "IRIS - UNIROMA1 - prod").
      The Sapienza Library System publishes open data and linked data (CC BY 4.0, 5-star model),
      confirmed reachable but without a formal API spec. A Shibboleth/SAML (IDEM federation) login
      backs identity but exposes no public API docs. The "Sapienza-University-Rome" GitHub org is
      research/coursework code, not an official platform org. No endpoints were fabricated; only
      live-probed or page-confirmed properties are cataloged. The alternate IRIS openaire4 OAI path
      did not resolve during probing and was left out as unverified.
    endpoints:
